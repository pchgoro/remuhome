<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たろみんサポートアプリ β版</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d14;
      --card: #1a1a2e;
      --accent: #a78bfa;
      --accent2: #f472b6;
      --accent3: #34d399;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --live: #f87171;
      --twitch: #9146ff;
      --youtube: #ff4444;
      --tiktok: #25f4ee;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', 'Zen Kaku Gothic New', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,20,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(167,139,250,0.15);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 22px; }
    .logo-text {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 900; font-size: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    main {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 24px 16px 80px;
    }
    .profile-banner {
      background: linear-gradient(135deg, rgba(167,139,250,0.1), rgba(244,114,182,0.08));
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 20px; padding: 24px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 20px;
    }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; flex-shrink: 0;
      box-shadow: 0 0 30px rgba(167,139,250,0.3);
    }
    .profile-info h1 { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 22px; margin-bottom: 4px; }
    .profile-info p { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .fan-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3);
      border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--accent); margin-top: 8px;
    }
    .live-banner {
      background: linear-gradient(135deg, rgba(248,113,113,0.15), rgba(145,70,255,0.1));
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 16px; padding: 16px 20px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 16px;
      text-decoration: none; color: inherit; transition: all 0.3s;
    }
    .live-banner:hover {
      border-color: rgba(248,113,113,0.5);
      transform: translateY(-1px);
    }
    .live-banner.hidden { display: none; }
    .live-dot {
      width: 10px; height: 10px; background: var(--live);
      border-radius: 50%; box-shadow: 0 0 10px var(--live);
      animation: pulse 1.5s infinite; flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.3); }
    }
    .live-info { flex: 1; min-width: 0; }
    .live-label { font-size: 11px; color: var(--live); font-weight: 700; letter-spacing: 1px; margin-bottom: 2px; }
    .live-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .live-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .platform-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .platform-badge.twitch { background: rgba(145,70,255,0.25); color: var(--twitch); }
    .platform-badge.youtube { background: rgba(255,68,68,0.2); color: var(--youtube); }
    .platform-badge.tiktok { background: rgba(37,244,238,0.16); color: var(--tiktok); }
    .new-badge {
      background: rgba(52,211,153,0.18);
      border: 1px solid rgba(52,211,153,0.35);
      border-radius: 4px;
      color: var(--accent3);
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      white-space: nowrap;
    }
    .watch-btn {
      background: var(--live); color: white; border: none;
      border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; white-space: nowrap;
    }
    .section-title {
      font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700;
      font-size: 14px; color: var(--muted); letter-spacing: 1px;
      margin-bottom: 12px; margin-top: 28px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
    .timeline { display: flex; flex-direction: column; gap: 8px; }
    .stream-card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      text-decoration: none; color: inherit; transition: all 0.2s;
    }
    .stream-card:hover { border-color: rgba(167,139,250,0.25); transform: translateX(4px); }
    .stream-thumb {
      width: 80px; height: 52px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      overflow: hidden;
      position: relative;
      background: rgba(255, 255, 255, 0.03);
    }
    .stream-thumb img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 2;
    }
    .thumb-fallback {
      position: absolute;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stream-thumb.twitch { background: rgba(145,70,255,0.15); }
    .stream-thumb.youtube { background: rgba(255,68,68,0.12); }
    .stream-thumb.tiktok { background: rgba(37,244,238,0.12); }
    .stream-info { flex: 1; min-width: 0; }
    .stream-title {
      font-size: 14px; font-weight: 600;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .stream-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
    .stream-duration { background: rgba(255,255,255,0.06); border-radius: 4px; padding: 2px 6px; font-size: 11px; }
    .loading { text-align: center; padding: 30px; color: var(--muted); font-size: 14px; }
    .empty-msg { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .stat-card { background: var(--card); border: 1px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 16px; text-align: center; }
    .stat-value {
      font-size: 24px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 4px;
    }
    .stat-label { font-size: 11px; color: var(--muted); }
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(13,13,20,0.95); backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-around; padding: 10px 0 20px; z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      border: none; background: none; color: var(--muted); font-family: inherit;
      cursor: pointer; padding: 4px 20px; border-radius: 10px;
    }
    .nav-item.active { color: var(--accent); }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 10px; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .beta-badge {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      color: white;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 99px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 6px;
      display: inline-block;
      vertical-align: middle;
      box-shadow: 0 0 10px rgba(244, 114, 182, 0.3);
    }
    
    /* Live preview thumb inside banner */
    .live-thumb-container {
      width: 80px; height: 45px; border-radius: 6px;
      overflow: hidden; flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }
    .live-thumb {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .live-banner-main {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      min-width: 0;
    }
    .live-banner-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    
    /* Mobile responsive design */
    @media (max-width: 600px) {
      header {
        padding: 0 16px;
      }
      .logo-text {
        font-size: 15px;
      }
      main {
        padding: 16px 12px 90px;
      }
      .profile-banner {
        flex-direction: column;
        text-align: center;
        padding: 20px 16px;
        gap: 12px;
      }
      .avatar {
        width: 64px; height: 64px;
        font-size: 28px;
      }
      .live-banner {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        padding: 14px;
      }
      .live-banner-main {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
      }
      .live-banner-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 10px;
        width: 100%;
      }
      .live-banner-actions .platform-badge {
        margin-left: 0;
      }
      .live-banner-actions .watch-btn {
        width: 100%;
        text-align: center;
        margin-top: 2px;
      }
      .stats-grid {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .stat-card {
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-align: left;
      }
      .stat-value {
        margin-bottom: 0;
        font-size: 20px;
        order: 2;
      }
      .stat-label {
        order: 1;
      }
    }
  </style>
</head>
<body>
<header>
  <div class="logo">
    <span class="logo-icon">🐈⚡</span>
    <span class="logo-text">たろみんサポートアプリ</span>
    <span class="beta-badge">β版</span>
  </div>
</header>

<main>
  <div class="profile-banner">
    <div class="avatar">🐈</div>
    <div class="profile-info">
      <h1>れむたろす</h1>
      <p>高身長女性キャラ大好き配信者 ✨ Twitch & YouTube Partner</p>
      <div class="fan-badge">🐈⚡ たろみんサポートアプリ</div>
    </div>
  </div>

  <div id="liveBanners"></div>

  <div class="section-title">📋 最近の配信</div>
  <div class="timeline" id="streamTimeline"><div class="loading">読み込み中...</div></div>

  <div class="section-title">▶ YouTubeの動画</div>
  <div class="timeline" id="ytTimeline"><div class="loading">読み込み中...</div></div>

  <div class="section-title">🎮 Twitchのクリップ</div>
  <div class="timeline" id="twClipTimeline"><div class="loading">読み込み中...</div></div>

  <div class="section-title">♪ TikTokの動画</div>
  <div class="timeline" id="tiktokTimeline"><div class="loading">読み込み中...</div></div>

  <div class="section-title">📊 今月の統計</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-value" id="statCount">-</div><div class="stat-label">今月の配信数</div></div>
    <div class="stat-card"><div class="stat-value" id="statPlatforms">-</div><div class="stat-label">配信プラットフォーム</div></div>
    <div class="stat-card"><div class="stat-value" id="statLatest">-</div><div class="stat-label">最終配信</div></div>
  </div>
</main>

<footer style="position:relative;z-index:1;max-width:900px;margin:0 auto;padding:12px 16px 90px;text-align:center;font-size:11px;color:#4a4a6a;line-height:1.8;">
  このアプリはファンが制作した非公式アプリです。配信情報に誤りがある場合があります。<br>
  正確な情報は<a href="https://x.com/remutarosu" target="_blank" rel="noopener" style="color:#a78bfa;">れむたろすさんのX</a>等をご確認ください。
</footer>

<div class="bottom-nav">
  <button class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-label">ホーム</span></button>
  <button class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-label">設定</span></button>
</div>

<script>
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    const now = new Date();
    const diff = Math.floor((now - d) / 86400000);
    if (diff === 0) return '今日';
    if (diff === 1) return '昨日';
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  function isNew(dateStr) {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    if (Number.isNaN(d.getTime())) return false;
    return Date.now() - d.getTime() <= 24 * 60 * 60 * 1000;
  }

  function parseYTDuration(iso) {
    if (!iso) return '';
    const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return '';
    const h = parseInt(m[1]||0), min = parseInt(m[2]||0);
    return h > 0 ? `${h}h ${min}m` : min > 0 ? `${min}m` : '';
  }

  function parseTWDuration(dur) {
    if (!dur) return '';
    const m = dur.match(/(?:(\d+)h)?(?:(\d+)m)?/);
    const h = parseInt(m?.[1]||0), min = parseInt(m?.[2]||0);
    return h > 0 ? `${h}h ${min}m` : min > 0 ? `${min}m` : '';
  }

  function makeCard(item) {
    const card = document.createElement('a');
    card.className = 'stream-card';
    card.href = item.url;
    card.target = '_blank';
    card.rel = 'noopener';
    const icons = { twitch: '🎮', youtube: '▶', tiktok: '♪' };
    const labels = { twitch: 'Twitch', youtube: 'YouTube', tiktok: 'TikTok' };
    const label = labels[item.platform] || item.platform;
    
    card.innerHTML = `
      <div class="stream-thumb ${item.platform}">
        ${item.thumbnail ? `<img src="${item.thumbnail}" alt="${item.title}" loading="lazy" onerror="this.remove();">` : ''}
        <span class="thumb-fallback">${icons[item.platform] || '🎥'}</span>
      </div>
      <div class="stream-info">
        <div class="stream-title">${item.title}</div>
        <div class="stream-meta">
          <span class="platform-badge ${item.platform}">${label}</span>
          ${isNew(item.date) ? '<span class="new-badge">NEW</span>' : ''}
          <span>${formatDate(item.date)}</span>
          ${item.duration ? `<span class="stream-duration">${item.duration}</span>` : ''}
          ${item.viewers ? `<span>👥 ${Number(item.viewers).toLocaleString()}</span>` : ''}
        </div>
      </div>
    `;
    return card;
  }

  function renderList(id, items, limit) {
    const el = document.getElementById(id);
    el.innerHTML = '';
    const list = limit ? items.slice(0, limit) : items;
    if (!list.length) {
      el.innerHTML = '<div class="empty-msg">データがありません</div>';
      return;
    }
    list.forEach(item => el.appendChild(makeCard(item)));
  }

  async function loadData() {
    let youtubeLive = null;
    let twitchLive = null;
    const streamItems = [];   // 最近の配信（YTアーカイブ＋TWアーカイブ）
    const ytVideoItems = [];  // YouTubeの通常動画
    const twClipItems = [];   // Twitchのクリップ
    const tiktokItems = [];   // TikTokの動画

    // YouTube
    try {
      const ytData = await fetch('/api/youtube').then(r => r.json());

      // ライブ中
      if (ytData.live?.length > 0) {
        const l = ytData.live[0];
        const videoId = l.id?.videoId || l.id;
        youtubeLive = {
          title: l.snippet?.title || 'YouTube配信中',
          url: `https://www.youtube.com/watch?v=${videoId}`,
          platform: 'youtube',
          date: l.snippet?.publishedAt,
          thumbnail: l.snippet?.thumbnails?.medium?.url || l.snippet?.thumbnails?.default?.url
        };
      }

      // 配信アーカイブ → 最近の配信
      (ytData.archives || []).forEach(v => {
        streamItems.push({
          title: v.snippet?.title || '不明',
          date: v.snippet?.publishedAt,
          url: `https://www.youtube.com/watch?v=${v.id}`,
          platform: 'youtube',
          duration: parseYTDuration(v.contentDetails?.duration),
          thumbnail: v.snippet?.thumbnails?.medium?.url || v.snippet?.thumbnails?.default?.url
        });
      });

      // 通常動画（upcoming=配信予定を除外）
      (ytData.videos || []).forEach(v => {
        const lbc = v.snippet?.liveBroadcastContent;
        if (lbc === 'upcoming' || lbc === 'live') return;
        ytVideoItems.push({
          title: v.snippet?.title || '不明',
          date: v.snippet?.publishedAt,
          url: `https://www.youtube.com/watch?v=${v.id}`,
          platform: 'youtube',
          duration: parseYTDuration(v.contentDetails?.duration),
          thumbnail: v.snippet?.thumbnails?.medium?.url || v.snippet?.thumbnails?.default?.url
        });
      });
    } catch(e) {
      console.error('YouTube error:', e);
    }

    // Twitch
    try {
      const twData = await fetch('/api/twitch').then(r => r.json());

      // ライブ中
      if (twData.live?.length > 0) {
        const l = twData.live[0];
        twitchLive = {
          title: l.title || 'Twitch配信中',
          url: 'https://twitch.tv/remutarosu',
          platform: 'twitch',
          viewers: l.viewer_count,
          date: l.started_at,
          thumbnail: l.thumbnail_url?.replace('{width}', '320').replace('{height}', '180')
        };
      }

      // アーカイブ → 最近の配信
      (twData.archives || []).forEach(v => {
        streamItems.push({
          title: v.title || '不明',
          date: v.created_at,
          url: v.url,
          platform: 'twitch',
          duration: parseTWDuration(v.duration),
          viewers: v.view_count,
          thumbnail: v.thumbnail_url?.replace('%{width}', '320').replace('%{height}', '180').replace('{width}', '320').replace('{height}', '180')
        });
      });

      // クリップ
      (twData.clips || []).forEach(c => {
        twClipItems.push({
          title: c.title || '不明',
          date: c.created_at,
          url: c.url,
          platform: 'twitch',
          duration: c.duration > 60 ? `${Math.floor(c.duration/60)}m` : `${Math.floor(c.duration)}s`,
          viewers: c.view_count,
          thumbnail: c.thumbnail_url
        });
      });
    } catch(e) {
      console.error('Twitch error:', e);
    }

    // TikTok
    try {
      const tiktokData = await fetch('/api/tiktok').then(r => r.json());

      (tiktokData.videos || []).forEach(v => {
        tiktokItems.push({
          title: v.title || 'TikTok動画',
          date: v.date,
          url: v.url,
          platform: 'tiktok',
          duration: v.duration,
          viewers: v.view_count,
          thumbnail: v.thumbnail
        });
      });
    } catch(e) {
      console.error('TikTok error:', e);
    }

    // ライブバナー（複数対応）
    const liveList = [twitchLive, youtubeLive].filter(Boolean);
    const bannersEl = document.getElementById('liveBanners');
    bannersEl.innerHTML = '';
    liveList.forEach(liveData => {
      const banner = document.createElement('a');
      banner.className = 'live-banner';
      banner.href = liveData.url;
      banner.target = '_blank';
      banner.rel = 'noopener';
      banner.style.marginBottom = '12px';
      const label = liveData.platform === 'twitch' ? 'Twitch' : 'YouTube';
      const meta = liveData.viewers ? `👥 ${Number(liveData.viewers).toLocaleString()}人` : '';
      banner.innerHTML = `
        <div class="live-banner-main">
          <div class="live-dot"></div>
          ${liveData.thumbnail ? `<div class="live-thumb-container"><img src="${liveData.thumbnail}" alt="Live Preview" class="live-thumb" onerror="this.parentElement.remove();"></div>` : ''}
          <div class="live-info">
            <div class="live-label">🔴 配信中</div>
            <div class="live-title">${liveData.title}</div>
            ${meta ? `<div class="live-meta">${meta}</div>` : ''}
          </div>
        </div>
        <div class="live-banner-actions">
          <span class="platform-badge ${liveData.platform}">${label}</span>
          ${isNew(liveData.date) ? '<span class="new-badge">NEW</span>' : ''}
          <button class="watch-btn">今すぐ見る</button>
        </div>
      `;
      bannersEl.appendChild(banner);
    });

    // 最近の配信：日付降順
    streamItems.sort((a, b) => new Date(b.date) - new Date(a.date));
    renderList('streamTimeline', streamItems, 15);

    // YouTubeの動画：日付降順
    ytVideoItems.sort((a, b) => new Date(b.date) - new Date(a.date));
    renderList('ytTimeline', ytVideoItems, 10);

    // Twitchのクリップ：日付降順
    twClipItems.sort((a, b) => new Date(b.date) - new Date(a.date));
    renderList('twClipTimeline', twClipItems, 10);

    // TikTokの動画：日付降順
    tiktokItems.sort((a, b) => new Date(b.date) - new Date(a.date));
    renderList('tiktokTimeline', tiktokItems, 10);

    // 統計
    const thisMonth = streamItems.filter(i => {
      const d = new Date(i.date);
      const now = new Date();
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    document.getElementById('statCount').textContent = thisMonth.length;
    const platforms = [...new Set(streamItems.map(i => i.platform))].length;
    document.getElementById('statPlatforms').textContent = platforms;
    if (streamItems[0]) {
      const d = new Date(streamItems[0].date);
      document.getElementById('statLatest').textContent = `${d.getMonth()+1}/${d.getDate()}`;
    }
  }

  loadData();
</script>
</body>
</html>
