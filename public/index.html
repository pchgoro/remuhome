<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たろ民サポートアプリ</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d14;
      --surface: #13131f;
      --card: #1a1a2e;
      --accent: #a78bfa;
      --accent2: #f472b6;
      --accent3: #34d399;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --live: #f87171;
      --twitch: #9146ff;
      --youtube: #ff4444;
      --tiktok: #00f2ea;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', 'Zen Kaku Gothic New', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(167,139,250,0.08) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px; left: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(244,114,182,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,13,20,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(167,139,250,0.15);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 22px; }
    .logo-text {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-weight: 900; font-size: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    nav { display: flex; gap: 4px; }
    nav button {
      background: none; border: none; color: var(--muted);
      font-family: inherit; font-size: 13px;
      padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    nav button.active, nav button:hover { background: rgba(167,139,250,0.12); color: var(--accent); }

    main {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 24px 16px 80px;
    }

    .profile-banner {
      background: linear-gradient(135deg, rgba(167,139,250,0.1), rgba(244,114,182,0.08));
      border: 1px solid rgba(167,139,250,0.2);
      border-radius: 20px; padding: 24px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 20px;
      animation: fadeIn 0.5s ease;
    }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; flex-shrink: 0;
      box-shadow: 0 0 30px rgba(167,139,250,0.3);
    }
    .profile-info h1 { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 22px; margin-bottom: 4px; }
    .profile-info p { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .fan-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3);
      border-radius: 20px; padding: 3px 10px; font-size: 12px; color: var(--accent); margin-top: 8px;
    }

    .live-banner {
      background: linear-gradient(135deg, rgba(248,113,113,0.15), rgba(145,70,255,0.1));
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 16px; padding: 16px 20px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer; transition: all 0.3s;
      animation: fadeIn 0.5s ease 0.1s both;
      text-decoration: none; color: inherit;
    }
    .live-banner:hover {
      border-color: rgba(248,113,113,0.5);
      background: linear-gradient(135deg, rgba(248,113,113,0.2), rgba(145,70,255,0.15));
      transform: translateY(-1px);
    }
    .live-banner.hidden { display: none; }
    .live-dot {
      width: 10px; height: 10px; background: var(--live);
      border-radius: 50%; box-shadow: 0 0 10px var(--live);
      animation: pulse 1.5s infinite; flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.3); }
    }
    .live-info { flex: 1; }
    .live-label { font-size: 11px; color: var(--live); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
    .live-title { font-size: 15px; font-weight: 600; }
    .live-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .platform-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
    .platform-badge.twitch { background: rgba(145,70,255,0.25); color: var(--twitch); }
    .platform-badge.youtube { background: rgba(255,68,68,0.2); color: var(--youtube); }
    .platform-badge.tiktok { background: rgba(0,242,234,0.15); color: var(--tiktok); }

    .watch-btn {
      background: var(--live); color: white; border: none;
      border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.2s; white-space: nowrap;
    }
    .watch-btn:hover { background: #ef4444; transform: scale(1.03); }

    .section-title {
      font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700;
      font-size: 14px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 12px; margin-top: 28px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }

    .timeline { display: flex; flex-direction: column; gap: 8px; }
    .date-label { font-size: 12px; color: var(--muted); padding: 4px 0; font-weight: 600; }

    .stream-card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer; transition: all 0.2s;
      animation: fadeIn 0.4s ease both;
      text-decoration: none; color: inherit;
    }
    .stream-card:hover { border-color: rgba(167,139,250,0.25); background: rgba(26,26,46,0.9); transform: translateX(4px); }
    .stream-thumb {
      width: 52px; height: 52px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }
    .stream-thumb.twitch { background: rgba(145,70,255,0.15); }
    .stream-thumb.youtube { background: rgba(255,68,68,0.12); }
    .stream-thumb.tiktok { background: rgba(0,242,234,0.1); }
    .stream-info { flex: 1; min-width: 0; }
    .stream-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .stream-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
    .stream-duration { background: rgba(255,255,255,0.06); border-radius: 4px; padding: 2px 6px; font-size: 11px; color: var(--muted); }

    .loading {
      text-align: center; padding: 40px; color: var(--muted); font-size: 14px;
    }
    .loading::after { content: ''; animation: dots 1.5s infinite; }
    @keyframes dots {
      0% { content: ''; } 33% { content: '.'; } 66% { content: '..'; } 100% { content: '...'; }
    }

    .error-msg {
      background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px; padding: 12px 16px; font-size: 13px; color: var(--live);
    }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .stat-card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px; padding: 16px; text-align: center;
    }
    .stat-value {
      font-size: 24px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 4px;
    }
    .stat-label { font-size: 11px; color: var(--muted); }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(13,13,20,0.95); backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-around; padding: 10px 0 20px; z-index: 100;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      cursor: pointer; padding: 4px 20px; border-radius: 10px; transition: all 0.2s;
      border: none; background: none; color: var(--muted); font-family: inherit;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item:hover { color: var(--text); }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 10px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-icon">🐈⚡</span>
    <span class="logo-text">たろ民サポートアプリ</span>
  </div>
  <nav>
    <button class="active">ホーム</button>
  </nav>
</header>

<main>
  <div class="profile-banner">
    <div class="avatar">🐈</div>
    <div class="profile-info">
      <h1>れむたろす</h1>
      <p>高身長女性キャラ大好き配信者 ✨ Twitch & YouTube Partner</p>
      <div class="fan-badge">🐈⚡ たろ民サポートアプリ</div>
    </div>
  </div>

  <!-- ライブバナー（JSで制御） -->
  <a id="liveBanner" class="live-banner hidden" href="#" target="_blank" rel="noopener">
    <div class="live-dot"></div>
    <div class="live-info">
      <div class="live-label">🔴 配信中</div>
      <div class="live-title" id="liveTitle">読み込み中...</div>
      <div class="live-meta" id="liveMeta"></div>
    </div>
    <span class="platform-badge" id="livePlatform"></span>
    <button class="watch-btn">今すぐ見る</button>
  </a>

  <div class="section-title">📋 最近の配信</div>
  <div class="timeline" id="timeline">
    <div class="loading">配信情報を読み込み中</div>
  </div>

  <div class="section-title">📊 今月の統計</div>
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-value" id="statCount">-</div><div class="stat-label">今月の配信数</div></div>
    <div class="stat-card"><div class="stat-value" id="statPlatforms">-</div><div class="stat-label">配信プラットフォーム</div></div>
    <div class="stat-card"><div class="stat-value" id="statLatest">-</div><div class="stat-label">最終配信</div></div>
  </div>
</main>

<div class="bottom-nav">
  <button class="nav-item active"><span class="nav-icon">🏠</span><span class="nav-label">ホーム</span></button>
  <button class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-label">設定</span></button>
</div>

<script>
  // 日付フォーマット
  function formatDate(dateStr) {
    const d = new Date(dateStr);
    const now = new Date();
    const diff = now - d;
    const days = Math.floor(diff / 86400000);
    if (days === 0) return '今日';
    if (days === 1) return '昨日';
    return `${d.getMonth()+1}/${d.getDate()}`;
  }

  // ISO8601 duration → 時間表示
  function parseDuration(iso) {
    if (!iso) return '';
    const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
    if (!m) return '';
    const h = parseInt(m[1]||0), min = parseInt(m[2]||0);
    if (h > 0) return `${h}h ${min}m`;
    return `${min}m`;
  }

  // タイムラインにカードを追加
  function addCard(container, item) {
    const card = document.createElement('a');
    card.className = `stream-card ${item.platform}`;
    card.href = item.url;
    card.target = '_blank';
    card.rel = 'noopener';

    const icons = { twitch: '🎮', youtube: '▶', tiktok: '🎵' };
    const dateStr = formatDate(item.date);

    card.innerHTML = `
      <div class="stream-thumb ${item.platform}">${icons[item.platform] || '🎥'}</div>
      <div class="stream-info">
        <div class="stream-title">${item.title}</div>
        <div class="stream-meta">
          <span class="platform-badge ${item.platform}">${item.platform === 'twitch' ? 'Twitch' : item.platform === 'youtube' ? 'YouTube' : 'TikTok'}</span>
          <span>${dateStr}</span>
          ${item.duration ? `<span class="stream-duration">${item.duration}</span>` : ''}
          ${item.viewers ? `<span>👥 ${item.viewers.toLocaleString()}</span>` : ''}
        </div>
      </div>
    `;
    container.appendChild(card);
  }

  async function loadData() {
    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '<div class="loading">配信情報を読み込み中</div>';

    const allItems = [];
    let twitchLive = null;
    let youtubeLive = null;

    // YouTube取得
    try {
      const ytRes = await fetch('/api/youtube');
      const ytData = await ytRes.json();

      if (ytData.live?.length > 0) {
        const l = ytData.live[0];
        const videoId = l.id?.videoId || l.id;
        youtubeLive = {
          title: l.snippet?.title || 'YouTube配信中',
          url: `https://www.youtube.com/watch?v=${videoId}`,
          platform: 'youtube',
          viewers: l.liveStreamingDetails?.concurrentViewers
        };
      }

      (ytData.videos || []).forEach(v => {
        allItems.push({
          title: v.snippet?.title || '不明',
          date: v.snippet?.publishedAt,
          url: `https://www.youtube.com/watch?v=${v.id}`,
          platform: 'youtube',
          duration: parseDuration(v.contentDetails?.duration)
        });
      });
    } catch(e) {
      console.error('YouTube error:', e);
    }

    // Twitch取得
    try {
      const twRes = await fetch('/api/twitch');
      const twData = await twRes.json();

      if (twData.live?.length > 0) {
        const l = twData.live[0];
        twitchLive = {
          title: l.title || 'Twitch配信中',
          url: `https://twitch.tv/remutarosu`,
          platform: 'twitch',
          viewers: l.viewer_count,
          startedAt: l.started_at
        };
      }

      (twData.clips || []).forEach(c => {
        allItems.push({
          title: c.title || '不明',
          date: c.created_at,
          url: c.url,
          platform: 'twitch',
          duration: `${Math.floor(c.duration / 60)}m`,
          viewers: c.view_count
        });
      });
    } catch(e) {
      console.error('Twitch error:', e);
    }

    // ライブバナー表示
    const liveBanner = document.getElementById('liveBanner');
    const liveData = twitchLive || youtubeLive;
    if (liveData) {
      liveBanner.classList.remove('hidden');
      liveBanner.href = liveData.url;
      document.getElementById('liveTitle').textContent = liveData.title;
      document.getElementById('livePlatform').textContent = liveData.platform === 'twitch' ? 'Twitch' : 'YouTube';
      document.getElementById('livePlatform').className = `platform-badge ${liveData.platform}`;
      const meta = liveData.viewers ? `👥 ${Number(liveData.viewers).toLocaleString()}人視聴中` : '';
      document.getElementById('liveMeta').textContent = meta;
    }

    // タイムライン表示
    timeline.innerHTML = '';
    if (allItems.length === 0) {
      timeline.innerHTML = '<div class="error-msg">配信情報を取得できませんでした</div>';
      return;
    }

    // 日付順ソート
    allItems.sort((a, b) => new Date(b.date) - new Date(a.date));
    allItems.slice(0, 15).forEach((item, i) => {
      const card = document.createElement('a');
      card.className = `stream-card`;
      card.href = item.url;
      card.target = '_blank';
      card.rel = 'noopener';
      card.style.animationDelay = `${i * 0.05}s`;

      const icons = { twitch: '🎮', youtube: '▶', tiktok: '🎵' };
      card.innerHTML = `
        <div class="stream-thumb ${item.platform}">${icons[item.platform] || '🎥'}</div>
        <div class="stream-info">
          <div class="stream-title">${item.title}</div>
          <div class="stream-meta">
            <span class="platform-badge ${item.platform}">${item.platform === 'twitch' ? 'Twitch' : item.platform === 'youtube' ? 'YouTube' : 'TikTok'}</span>
            <span>${formatDate(item.date)}</span>
            ${item.duration ? `<span class="stream-duration">${item.duration}</span>` : ''}
            ${item.viewers ? `<span>👥 ${Number(item.viewers).toLocaleString()}</span>` : ''}
          </div>
        </div>
      `;
      timeline.appendChild(card);
    });

    // 統計
    const thisMonth = allItems.filter(i => {
      const d = new Date(i.date);
      const now = new Date();
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });

    document.getElementById('statCount').textContent = thisMonth.length;
    const platforms = [...new Set(allItems.map(i => i.platform))].length;
    document.getElementById('statPlatforms').textContent = platforms;
    if (allItems[0]) {
      const d = new Date(allItems[0].date);
      document.getElementById('statLatest').textContent = `${d.getMonth()+1}/${d.getDate()}`;
    }
  }

  loadData();
</script>

</body>
</html>
